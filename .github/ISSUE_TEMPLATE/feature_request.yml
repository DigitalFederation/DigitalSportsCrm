name: Feature Request
description: Suggest an improvement or new capability.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Keep requests generic. Do not include private client commitments, commercial arrangements, secrets, or production data.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility Notes
      description: Mention migrations, env variables, public routes, or operational risks if known.
