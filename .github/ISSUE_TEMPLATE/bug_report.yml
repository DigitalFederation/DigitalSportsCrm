name: Bug Report
description: Report a reproducible problem in Digital Sports CRM.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, private URLs, production data, member records, invoices, uploaded documents, or private branding.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps To Reproduce
      description: Provide a minimal reproducible case.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include versions and relevant configuration without secrets.
      placeholder: |
        PHP:
        Laravel:
        Node:
        Database:
        Browser:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Screenshots
      description: Redact secrets and personal data before attaching anything.
      render: text
