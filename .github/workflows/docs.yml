name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # The docs build doesn't need the app's heavyweight runtime deps.
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - id: pages
        uses: actions/configure-pages@v5
        with:
          # Enable GitHub Pages automatically on first run (no manual Settings step needed).
          enablement: true
      - run: npm ci
      - name: Resolve VitePress base
        # configure-pages emits base_path as "/<repo>" for a project site, or "/" for a
        # user/org root or custom domain. VitePress needs exactly one trailing slash and
        # no double slash, so normalise: strip any trailing "/", then append one.
        # "/<repo>" -> "/<repo>/"   and   "/" (or "") -> "/"
        run: |
          base='${{ steps.pages.outputs.base_path }}'
          echo "DOCS_BASE=${base%/}/" >> "$GITHUB_ENV"
      - run: npm run docs:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
